security:
    providers:
        microservice_clients:
            memory:
                users:
                    backoffice:
                        password: ''
                        roles: ['ROLE_MICROSERVICE_CLIENT']

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        health:
            pattern: ^/health$
            security: false
        mail_api:
            pattern: ^/api
            stateless: true
            provider: microservice_clients
            custom_authenticators:
                - App\Security\SharedTokenAuthenticator

    access_control:
        - { path: ^/api, roles: ROLE_MICROSERVICE_CLIENT }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
