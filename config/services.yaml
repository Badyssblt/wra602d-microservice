# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/Dto/'
            - '../src/Exception/'

    App\Mailer\MailSenderInterface: '@App\Mailer\SymfonyMailSender'
    App\Mailer\TemplateResolverInterface: '@App\Mailer\TwigTemplateResolver'

    App\Mailer\SymfonyMailSender:
        arguments:
            $mailerLogger: '@monolog.logger.mailer'
